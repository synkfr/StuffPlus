name: Build and Package Staff+

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build & Deploy Shaded JARs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew || true

      - name: Build with Gradle
        run: ./gradlew clean build

      # Collect shaded JARs from both platform modules into a single staging directory
      - name: Stage Release Artifacts
        run: |
          mkdir -p staging
          cp staff-paper/build/libs/StaffPlus-Paper-*.jar staging/
          cp staff-velocity/build/libs/StaffPlus-Velocity-*.jar staging/
          echo "Staged artifacts:"
          ls -lh staging/

      - name: Upload Paper JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StaffPlus-Paper
          path: staging/StaffPlus-Paper-*.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload Velocity JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StaffPlus-Velocity
          path: staging/StaffPlus-Velocity-*.jar
          if-no-files-found: error
          retention-days: 7

      # 1. Dev Build (Pre-Release) Deployment
      - name: Deploy Dev Pre-Release Build
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Deploying rolling dev pre-release..."
          
          # Delete any previous rolling dev-latest release to maintain a clean rolling release
          git tag -d dev-latest || true
          gh release delete dev-latest --yes || true
          git push --delete origin dev-latest || true
          
          # Create rolling dev-latest pre-release with both platform JARs
          gh release create "dev-latest" staging/*.jar \
            --prerelease \
            --title "Dev Build (Latest)" \
            --target "${{ github.sha }}" \
            --notes "Latest development pre-release build from branch master. Commit: $SHORT_SHA (Run #${{ github.run_number }}).

          **Artifacts:**
          - \`StaffPlus-Paper\` — For Paper/Purpur/Folia 1.20+ servers
          - \`StaffPlus-Velocity\` — For Velocity 3.3.0+ proxies"

      # 2. Production Release Deployment
      - name: Deploy Production Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Deploying production release: $TAG_NAME"
          
          gh release create "$TAG_NAME" staging/*.jar \
            --title "Release $TAG_NAME" \
            --notes "Official production release of Staff+ ($TAG_NAME).

          **Artifacts:**
          - \`StaffPlus-Paper\` — For Paper/Purpur/Folia 1.20+ servers
          - \`StaffPlus-Velocity\` — For Velocity 3.3.0+ proxies"
