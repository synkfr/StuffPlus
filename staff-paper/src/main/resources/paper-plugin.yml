name: Staff
version: 1.0.0
main: me.ayosynk.staff.bukkit.StaffBukkitPlugin
api-version: '1.20'
folia-supported: true
description: Advanced modern moderation and utility plugin with Folia support.
authors: [me.ayosynk, Antigravity]

permissions:
  staff.admin:
    description: Gives all staff permissions.
    default: op
    children:
      staff.mute: true
      staff.tempmute: true
      staff.ban: true
      staff.tempban: true
      staff.ipban: true
      staff.tempipban: true
      staff.unmute: true
      staff.unban: true
      staff.unipban: true
      staff.warn: true
      staff.warns: true
      staff.invsee: true
      staff.vanish: true
      staff.vanish.see: true
      staff.monitor: true
      staff.fly: true
      staff.gmc: true
      staff.gms: true
      staff.gmsp: true
      staff.gma: true
      staff.import: true
      staff.staff: true

