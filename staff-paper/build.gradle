// staff-paper: Paper/Purpur/Folia backend plugin
plugins {
    id 'com.gradleup.shadow'
}

dependencies {
    // Inherit the shared core module
    implementation project(':staff-core')

    // Paper API (provided at runtime by the server)
    compileOnly 'io.papermc.paper:paper-api:1.21.1-R0.1-SNAPSHOT'

    // Okaeri Bukkit serializer (shaded, extends the core snakeyaml configurer)
    implementation 'eu.okaeri:okaeri-configs-yaml-bukkit:5.0.13'
    implementation 'eu.okaeri:okaeri-configs-serdes-bukkit:5.0.13'

    // bStats (shaded)
    implementation 'org.bstats:bstats-bukkit:3.0.2'
}

shadowJar {
    archiveBaseName.set('StaffPlus-Paper')
    archiveClassifier.set('')

    // Relocate shaded dependencies to prevent conflicts
    relocate 'eu.okaeri', 'me.ayosynk.staff.libs.okaeri'
    relocate 'com.zaxxer.hikari', 'me.ayosynk.staff.libs.hikari'
    relocate 'org.bstats', 'me.ayosynk.staff.libs.bstats'
    relocate 'org.h2', 'me.ayosynk.staff.libs.h2'
    relocate 'org.xerial', 'me.ayosynk.staff.libs.xerial'

    // Exclude SLF4J — Paper provides it
    exclude 'org/slf4j/**'
}

build {
    dependsOn shadowJar
}
