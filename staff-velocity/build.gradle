// staff-velocity: Velocity proxy plugin
plugins {
    id 'com.gradleup.shadow'
}

dependencies {
    // Inherit the shared core module
    implementation project(':staff-core')

    // Velocity API (provided at runtime by the proxy)
    compileOnly 'com.velocitypowered:velocity-api:3.3.0-SNAPSHOT'
    annotationProcessor 'com.velocitypowered:velocity-api:3.3.0-SNAPSHOT'

    // Okaeri snakeyaml configurer (for Velocity — no Bukkit dependency)
    implementation 'eu.okaeri:okaeri-configs-yaml-snakeyaml:5.0.13'

    // bStats for Velocity (shaded)
    implementation 'org.bstats:bstats-velocity:3.2.1'
}

shadowJar {
    archiveBaseName.set('StaffPlus-Velocity')
    archiveClassifier.set('')

    // Relocate shaded dependencies to prevent conflicts
    relocate 'eu.okaeri', 'me.ayosynk.staff.libs.okaeri'
    relocate 'com.zaxxer.hikari', 'me.ayosynk.staff.libs.hikari'
    relocate 'org.h2', 'me.ayosynk.staff.libs.h2'
    relocate 'org.xerial', 'me.ayosynk.staff.libs.xerial'
    relocate 'org.bstats', 'me.ayosynk.staff.libs.bstats'

    // Exclude SLF4J — Velocity provides it
    exclude 'org/slf4j/**'
}

build {
    dependsOn shadowJar
}
